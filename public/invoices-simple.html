<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>发票管理 - 设计师接单平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #F5F6FA; min-height: 100vh; }
    
    .container { max-width: 1200px; }
    
    .header { text-align: center; margin-bottom: 30px; padding: 20px; }
    .title { font-size: 28px; font-weight: 700; color: #1D2129; margin-bottom: 8px; }
    .subtitle { font-size: 16px; color: #86909C; }
    
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
    .stat-card { background: white; border: 1px solid #E5E6EB; border-radius: 12px; padding: 20px; text-align: center; }
    .stat-label { font-size: 14px; color: #86909C; margin-bottom: 8px; }
    .stat-value { font-size: 24px; font-weight: 700; color: #00B578; }
    
    .controls { background: white; border: 1px solid #E5E6EB; border-radius: 12px; padding: 20px; margin-bottom: 30px; display: flex; gap: 16px; flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 200px; padding: 12px 16px; border: 1px solid #E5E6EB; border-radius: 8px; font-size: 14px; }
    .filter-select { padding: 12px 16px; border: 1px solid #E5E6EB; border-radius: 8px; font-size: 14px; min-width: 120px; }
    .add-btn { background: #00B578; color: white; border: none; border-radius: 8px; padding: 12px 20px; font-size: 14px; font-weight: 500; cursor: pointer; }
    
    .invoices-table { background: white; border: 1px solid #E5E6EB; border-radius: 12px; overflow: hidden; }
    .table-header { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 0.5fr; background: #F5F6FA; padding: 16px 20px; border-bottom: 1px solid #E5E6EB; font-weight: 600; color: #1D2129; }
    .table-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 0.5fr; padding: 16px 20px; border-bottom: 1px solid #E5E6EB; align-items: center; }
    .table-row:hover { background: #F5F6FA; }
    
    .invoice-number { font-weight: 600; color: #1D2129; }
    .invoice-client { color: #1D2129; }
    .invoice-amount { font-weight: 600; color: #1D2129; }
    .invoice-date { color: #86909C; font-size: 14px; }
    .invoice-due-date { color: #86909C; font-size: 14px; }
    
    .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; text-align: center; }
    .status-draft { background: rgba(255, 125, 0, 0.1); color: #FF7D00; }
    .status-sent { background: rgba(0, 181, 120, 0.1); color: #00B578; }
    .status-paid { background: rgba(0, 181, 120, 0.1); color: #00B578; }
    .status-overdue { background: rgba(255, 77, 79, 0.1); color: #FF4D4F; }
    
    .action-btn { background: none; border: 1px solid #E5E6EB; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; color: #1D2129; }
    .action-btn:hover { background: #F5F6FA; }
    
    .loading { text-align: center; padding: 60px; }
    .spinner { width: 48px; height: 48px; border: 4px solid #E5E6EB; border-top-color: #00B578; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error { background: #FFF2F0; border: 1px solid #FFCCC7; color: #FF4D4F; padding: 16px; border-radius: 8px; margin-bottom: 20px; }
    
    
    .nav-link { color: #00B578; text-decoration: none; padding: 8px 16px; border-radius: 8px; }
    .nav-link:hover { background: rgba(0, 181, 120, 0.1); }
    
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 30px; }
    .page-btn { padding: 8px 12px; border: 1px solid #E5E6EB; border-radius: 6px; background: white; cursor: pointer; }
    .page-btn.active { background: #00B578; color: white; border-color: #00B578; }
    
    .summary-card { background: white; border: 1px solid #E5E6EB; border-radius: 12px; padding: 24px; margin-bottom: 30px; }
    .summary-title { font-size: 18px; font-weight: 600; color: #1D2129; margin-bottom: 16px; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; }
    .summary-item { text-align: center; }
    .summary-label { font-size: 14px; color: #86909C; margin-bottom: 4px; }
    .summary-value { font-size: 20px; font-weight: 700; color: #1D2129; }
    
    @media (max-width: 768px) {
      .table-header, .table-row { grid-template-columns: 1fr; gap: 8px; }
      .controls { flex-direction: column; }
      .summary-grid { grid-template-columns: 1fr; }
    }
      /* 左侧导航 */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 240px;
      height: 100vh;
      background: white;
      border-right: 1px solid #E5E6EB;
      padding: 20px;
      overflow-y: auto;
      z-index: 1000;
    }
    
    .sidebar-header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #E5E6EB;
    }
    
    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
      color: #1D2129;
      margin-bottom: 4px;
    }
    
    .sidebar-subtitle {
      font-size: 12px;
      color: #86909C;
    }
    
    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: #1D2129;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.2s;
    }
    
    .nav-link:hover {
      background: #F5F6FA;
      color: #00B578;
    }
    
    .nav-link.active {
      background: rgba(0, 181, 120, 0.1);
      color: #00B578;
      font-weight: 500;
    }
    
    .nav-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }
    
    .nav-text {
      font-size: 14px;
    }
    
    /* 主内容区域 */
    .main-content {
      margin-left: 240px;
      padding: 20px;
    }
    
    @media (max-width: 768px) {
      .sidebar {
        width: 200px;
        transform: translateX(-100%);
        transition: transform 0.3s;
      }
      
      .sidebar.open {
        transform: translateX(0);
      }
      
      .main-content {
        margin-left: 0;
      }
      
      .mobile-menu-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 1001;
        background: white;
        border: 1px solid #E5E6EB;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
      }
    }
  </style>
</head>
<body>
    <!-- 左侧导航 -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">设计师平台</div>
        <div class="sidebar-subtitle">管理您的设计业务</div>
      </div>
      
      <div class="nav-menu">
        <a href="/dashboard-simple.html" class="nav-link ">
          <div class="nav-icon">📊</div>
          <div class="nav-text">仪表盘</div>
        </a>
        <a href="/services-simple.html" class="nav-link ">
          <div class="nav-icon">🛠️</div>
          <div class="nav-text">服务管理</div>
        </a>
        <a href="/clients-simple.html" class="nav-link ">
          <div class="nav-icon">👥</div>
          <div class="nav-text">客户管理</div>
        </a>
        <a href="/orders-simple.html" class="nav-link ">

        <a href="/contracts-simple.html" class="nav-link ">

        <a href="/notifications-simple.html" class="nav-link ">

    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-btn" id="mobileMenuBtn" style="display: none;">☰</button>
    
    <!-- 主内容 -->
    <div class="main-content">
    <div class="container">
    <!-- 标题 -->
    <div class="header">
      <h1 class="title">发票管理</h1>
      <p class="subtitle">管理您的设计服务发票</p>
    </div>
    
    <!-- 财务概览 -->
    <div class="summary-card">
      <h2 class="summary-title">财务概览</h2>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-label">待收发票</div>
          <div class="summary-value" id="pending-amount">¥0</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">已收发票</div>
          <div class="summary-value" id="paid-amount">¥0</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">逾期发票</div>
          <div class="summary-value" id="overdue-amount">¥0</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">本月收入</div>
          <div class="summary-value" id="monthly-income">¥0</div>
        </div>
      </div>
    </div>
    
    <!-- 统计卡片 -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">总发票数</div>
        <div class="stat-value" id="total-invoices">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">待发送</div>
        <div class="stat-value" id="draft-invoices">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">已发送</div>
        <div class="stat-value" id="sent-invoices">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">已支付</div>
        <div class="stat-value" id="paid-invoices">0</div>
      </div>
    </div>
    
    <!-- 控制栏 -->
    <div class="controls">
      <input type="text" class="search-input" placeholder="搜索发票号或客户..." id="search-input">
      <select class="filter-select" id="status-filter">
        <option value="">所有状态</option>
        <option value="draft">草稿</option>
        <option value="sent">已发送</option>
        <option value="paid">已支付</option>
        <option value="overdue">已逾期</option>
      </select>
      <select class="filter-select" id="month-filter">
        <option value="">所有月份</option>
        <option value="2026-01">2026年1月</option>
        <option value="2026-02">2026年2月</option>
        <option value="2026-03">2026年3月</option>
        <option value="2026-04">2026年4月</option>
      </select>
      <button class="add-btn" onclick="createNewInvoice()">+ 新建发票</button>
    </div>
    
    <!-- 错误提示 -->
    <div class="error" id="error-message" style="display: none;"></div>
    
    <!-- 加载中 -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>加载发票数据...</p>
    </div>
    
    <!-- 发票表格 -->
    <div class="invoices-table" id="invoices-table" style="display: none;">
      <div class="table-header">
        <div>发票号</div>
        <div>客户</div>
        <div>金额</div>
        <div>创建日期</div>
        <div>到期日</div>
        <div>状态</div>
        <div>操作</div>
      </div>
      <div id="invoices-list"></div>
    </div>
    
    <!-- 分页 -->
    <div class="pagination" id="pagination" style="display: none;"></div>
  </div>

  <script>
    let invoices = [];
    let filteredInvoices = [];
    let currentPage = 1;
    const pageSize = 10;
    
    // 检查登录状态
    async function checkAuth() {
      try {
        const response = await fetch('/api/auth/session', {
          credentials: 'include'
        });
        
        if (!response.ok) {
          window.location.href = 'login-final.html';
          return null;
        }
        
        return await response.json();
      } catch (error) {
        console.error('认证检查失败:', error);
        window.location.href = 'login-final.html';
        return null;
      }
    }
    
    // 加载发票数据
    async function loadInvoices() {
      try {

      // 模拟数据（当API不可用时）
      const useMockData = localStorage.getItem('useMockData') === 'true' || window.location.search.includes('mock=true');
      if (useMockData) {
        console.log('使用模拟数据');
        const mockData = getMockInvoices();
        updateStats(mockData);
        renderInvoices(mockData);
        showLoading(false);
        return;
      }
      
        const session = await checkAuth();
        if (!session) return;
        
        const response = await fetch('/api/data?type=invoices', {
          credentials: 'include'
        });
        
        if (!response.ok) {
          throw new Error(`加载失败: ${response.status}`);
        }
        
        invoices = await response.json();
        updateStats();
        updateFinancialSummary();
        filterInvoices();
        
        // 隐藏加载中，显示表格
        document.getElementById('loading').style.display = 'none';
        document.getElementById('invoices-table').style.display = 'block';
        document.getElementById('pagination').style.display = 'flex';
        
      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        showError('加载发票数据失败: ' + error.message);
      }
    }
    
    // 更新统计信息
    function updateStats() {
      const total = invoices.length;
      const draft = invoices.filter(i => i.status === 'draft').length;
      const sent = invoices.filter(i => i.status === 'sent').length;
      const paid = invoices.filter(i => i.status === 'paid').length;
      
      document.getElementById('total-invoices').textContent = total;
      document.getElementById('draft-invoices').textContent = draft;
      document.getElementById('sent-invoices').textContent = sent;
      document.getElementById('paid-invoices').textContent = paid;
    }
    
    // 更新财务概览
    function updateFinancialSummary() {
      const pendingAmount = invoices
        .filter(i => i.status === 'sent')
        .reduce((sum, i) => sum + (i.amount || 0), 0);
      
      const paidAmount = invoices
        .filter(i => i.status === 'paid')
        .reduce((sum, i) => sum + (i.amount || 0), 0);
      
      const overdueAmount = invoices
        .filter(i => i.status === 'overdue')
        .reduce((sum, i) => sum + (i.amount || 0), 0);
      
      // 计算本月收入（4月份）
      const currentMonth = '2026-04';
      const monthlyIncome = invoices
        .filter(i => i.status === 'paid' && i.paidDate?.startsWith(currentMonth))
        .reduce((sum, i) => sum + (i.amount || 0), 0);
      
      document.getElementById('pending-amount').textContent = '¥' + pendingAmount.toLocaleString();
      document.getElementById('paid-amount').textContent = '¥' + paidAmount.toLocaleString();
      document.getElementById('overdue-amount').textContent = '¥' + overdueAmount.toLocaleString();
      document.getElementById('monthly-income').textContent = '¥' + monthlyIncome.toLocaleString();
    }
    
    // 筛选发票
    function filterInvoices() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      const statusFilter = document.getElementById('status-filter').value;
      const monthFilter = document.getElementById('month-filter').value;
      
      filteredInvoices = invoices.filter(invoice => {
        const matchesSearch = !searchTerm || 
          invoice.invoiceNumber?.toLowerCase().includes(searchTerm) ||
          invoice.clientName?.toLowerCase().includes(searchTerm);
        
        const matchesStatus = !statusFilter || invoice.status === statusFilter;
        
        const matchesMonth = !monthFilter || 
          (invoice.createdAt && invoice.createdAt.startsWith(monthFilter));
        
        return matchesSearch && matchesStatus && matchesMonth;
      });
      
      renderInvoices();
      renderPagination();
    }
    
    // 渲染发票列表
    

    // 模拟发票数据
    function getMockInvoices() {
      return [
        {
          id: '1',
          invoiceNumber: 'INV-202404001',
          client: '张先生',
          amount: 12000,
          issueDate: '2026-04-01',
          dueDate: '2026-04-15',
          status: 'sent'
        },
        {
          id: '2',
          invoiceNumber: 'INV-202404002',
          client: '李女士',
          amount: 8000,
          issueDate: '2026-04-02',
          dueDate: '2026-04-16',
          status: 'paid'
        },
        {
          id: '3',
          invoiceNumber: 'INV-202404003',
          client: '王先生',
          amount: 15000,
          issueDate: '2026-03-28',
          dueDate: '2026-04-12',
          status: 'overdue'
        }
      ];
    }

function renderInvoices() {
      const startIndex = (currentPage - 1) * pageSize;
      const endIndex = startIndex + pageSize;
      const pageInvoices = filteredInvoices.slice(startIndex, endIndex);
      
      const invoicesList = document.getElementById('invoices-list');
      invoicesList.innerHTML = '';
      
      if (pageInvoices.length === 0) {
        invoicesList.innerHTML = `
          <div class="table-row" style="text-align: center; padding: 40px;">
            <div style="grid-column: 1 / -1; color: #86909C;">
              暂无发票数据
            </div>
          </div>
        `;
        return;
      }
      
      pageInvoices.forEach(invoice => {
        const row = document.createElement('div');
        row.className = 'table-row';
        
        const statusClass = `status-${invoice.status}`;
        const statusText = {
          draft: '草稿',
          sent: '已发送',
          paid: '已支付',
          overdue: '已逾期'
        }[invoice.status] || invoice.status;
        
        const createdDate = new Date(invoice.createdAt).toLocaleDateString('zh-CN');
        const dueDate = invoice.dueDate ? new Date(invoice.dueDate).toLocaleDateString('zh-CN') : '-';
        const formattedAmount = invoice.amount ? '¥' + invoice.amount.toLocaleString() : '-';
        
        row.innerHTML = `
          <div class="invoice-number">${invoice.invoiceNumber || 'INV-' + invoice.id.slice(0, 8)}</div>
          <div class="invoice-client">${invoice.clientName || '-'}</div>
          <div class="invoice-amount">${formattedAmount}</div>
          <div class="invoice-date">${createdDate}</div>
          <div class="invoice-due-date">${dueDate}</div>
          <div><span class="status-badge ${statusClass}">${statusText}</span></div>
          <div>
            <button class="action-btn" onclick="viewInvoice('${invoice.id}')">查看</button>
          </div>
        `;
        
        invoicesList.appendChild(row);
      });
    }
    
    // 渲染分页
    function renderPagination() {
      const totalPages = Math.ceil(filteredInvoices.length / pageSize);
      const pagination = document.getElementById('pagination');
      pagination.innerHTML = '';
      
      if (totalPages <= 1) return;
      
      // 上一页按钮
      const prevBtn = document.createElement('button');
      prevBtn.className = 'page-btn';
      prevBtn.textContent = '上一页';
      prevBtn.disabled = currentPage === 1;
      prevBtn.onclick = () => {
        if (currentPage > 1) {
          currentPage--;
          renderInvoices();
          renderPagination();
        }
      };
      pagination.appendChild(prevBtn);
      
      // 页码按钮
      for (let i = 1; i <= totalPages; i++) {
        const pageBtn = document.createElement('button');
        pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
        pageBtn.textContent = i;
        pageBtn.onclick = () => {
          currentPage = i;
          renderInvoices();
          renderPagination();
        };
        pagination.appendChild(pageBtn);
      }
      
      // 下一页按钮
      const nextBtn = document.createElement('button');
      nextBtn.className = 'page-btn';
      nextBtn.textContent = '下一页';
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.onclick = () => {
        if (currentPage < totalPages) {
          currentPage++;
          renderInvoices();
          renderPagination();
        }
      };
      pagination.appendChild(nextBtn);
    }
    
    // 查看发票详情
    function viewInvoice(invoiceId) {
      alert(`查看发票 ${invoiceId} - 功能开发中`);
      // 实际实现中会跳转到发票详情页或打开PDF
    }
    
    // 创建新发票
    function createNewInvoice() {
      alert('创建新发票 - 功能开发中');
      // 实际实现中会打开发票创建表单
    }
    
    // 显示错误信息
        // 显示/隐藏加载状态
    function showLoading(show) {
      const loadingDiv = document.getElementById('loading');
      const contentDiv = document.getElementById('content-container');
      if (loadingDiv) loadingDiv.style.display = show ? 'block' : 'none';
      if (contentDiv) contentDiv.style.display = show ? 'none' : 'block';
    }

    // 显示错误信息
    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 5000);
    }
    
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadInvoices();
      
      // 绑定搜索和筛选事件
      document.getElementById('search-input').addEventListener('input', filterInvoices);
      document.getElementById('status-filter').addEventListener('change', filterInvoices);
      document.getElementById('month-filter').addEventListener('change', filterInvoices);
    });</html>
