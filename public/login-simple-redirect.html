<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单登录跳转</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00B578, #009A63);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            color: #333;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #00B578;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .login-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #00B578;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
        }
        
        .login-btn:hover {
            background: #009A63;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 181, 120, 0.3);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .direct-link {
            display: block;
            padding: 12px;
            border: 2px solid #00B578;
            color: #00B578;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .direct-link:hover {
            background: #00B578;
            color: white;
        }
        
        .status {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: left;
        }
        
        .status h3 {
            color: #00B578;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .success {
            color: #28a745;
            font-weight: 600;
        }
        
        .info {
            color: #17a2b8;
        }
        
        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 14px;
            text-align: left;
        }
        
        .instructions h3 {
            margin-bottom: 10px;
            color: white;
        }
        
        .instructions ol {
            padding-left: 20px;
        }
        
        .instructions li {
            margin-bottom: 8px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔓 简单登录</h1>
        <p class="subtitle">点击按钮直接登录并跳转</p>
        
        <button class="login-btn" id="loginBtn">
            点击登录
        </button>
        
        <a href="/services" class="direct-link">
            直接访问服务页面（不登录）
        </a>
        
        <div class="status">
            <h3>登录状态</h3>
            <div class="status-item">
                <span>当前状态：</span>
                <span id="loginStatus">未登录</span>
            </div>
            <div class="status-item">
                <span>跳转状态：</span>
                <span id="redirectStatus">等待操作</span>
            </div>
            <div class="status-item">
                <span>LocalStorage：</span>
                <span id="storageStatus">检测中...</span>
            </div>
        </div>
    </div>
    
    <div class="instructions">
        <h3>💡 工作原理</h3>
        <ol>
            <li>点击"点击登录"按钮</li>
            <li>设置 localStorage 登录状态</li>
            <li>直接使用 window.location 跳转</li>
            <li>跳转到 /services 页面</li>
            <li>服务页面检查登录状态并显示内容</li>
        </ol>
    </div>
    
    <script>
        // 检查系统状态
        function checkStatus() {
            // 检查LocalStorage
            try {
                localStorage.setItem('test', 'ok');
                localStorage.removeItem('test');
                document.getElementById('storageStatus').textContent = '✅ 正常';
                document.getElementById('storageStatus').className = 'success';
            } catch (e) {
                document.getElementById('storageStatus').textContent = '❌ 异常';
                document.getElementById('storageStatus').className = 'info';
            }
            
            // 检查登录状态
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const userName = localStorage.getItem('userName');
            if (isLoggedIn) {
                document.getElementById('loginStatus').textContent = `✅ 已登录 (${userName || '用户'})`;
                document.getElementById('loginStatus').className = 'success';
            }
        }
        
        // 登录函数
        function login() {
            console.log('=== 开始登录 ===');
            
            // 更新状态显示
            document.getElementById('loginStatus').textContent = '登录中...';
            document.getElementById('redirectStatus').textContent = '准备跳转...';
            
            try {
                // 1. 设置登录状态
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', '设计师小王');
                localStorage.setItem('loginTime', new Date().toISOString());
                
                console.log('✅ 登录状态已保存');
                document.getElementById('loginStatus').textContent = '✅ 登录成功';
                document.getElementById('loginStatus').className = 'success';
                
                // 2. 显示跳转提示
                document.getElementById('redirectStatus').textContent = '正在跳转...';
                
                // 3. 直接跳转（最可靠的方式）
                console.log('跳转到 /services');
                setTimeout(() => {
                    window.location.href = '/services';
                }, 300);
                
            } catch (error) {
                console.error('登录错误:', error);
                document.getElementById('loginStatus').textContent = '❌ 登录失败';
                document.getElementById('redirectStatus').textContent = '请手动点击链接';
                
                alert('登录失败: ' + error.message + '\n请手动点击"直接访问服务页面"链接');
            }
        }
        
        // 页面加载时检查状态
        document.addEventListener('DOMContentLoaded', checkStatus);
        
        // 绑定登录按钮事件
        document.getElementById('loginBtn').addEventListener('click', login);
        
        // 每2秒更新一次状态
        setInterval(checkStatus, 2000);
        
        // 添加键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                login();
            }
        });
    </script>
</body>
</html>
