<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>认证测试 - 设计师接单平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #F5F6FA; min-height: 100vh; padding: 20px; display: flex; align-items: center; justify-content: center; }
    
    .container { max-width: 400px; width: 100%; }
    
    .card { background: white; border: 1px solid #E5E6EB; border-radius: 12px; padding: 30px; }
    .title { font-size: 24px; font-weight: 700; color: #1D2129; margin-bottom: 20px; text-align: center; }
    
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 14px; font-weight: 600; color: #1D2129; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 12px 16px; border: 1px solid #E5E6EB; border-radius: 8px; font-size: 14px; }
    
    .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 12px; }
    .btn-primary { background: #00B578; color: white; }
    .btn-primary:hover { background: #009A63; }
    .btn-secondary { background: white; border: 1px solid #E5E6EB; color: #1D2129; }
    .btn-secondary:hover { background: #F5F6FA; }
    
    .result { margin-top: 20px; padding: 16px; border-radius: 8px; font-size: 14px; }
    .success { background: #F6FFED; border: 1px solid #B7EB8F; color: #52C41A; }
    .error { background: #FFF2F0; border: 1px solid #FFCCC7; color: #FF4D4F; }
    
    .loading { text-align: center; padding: 20px; }
    .spinner { width: 24px; height: 24px; border: 3px solid #E5E6EB; border-top-color: #00B578; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1 class="title">认证测试</h1>
      
      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input type="email" class="form-input" id="email" placeholder="designer@test.com" value="designer@test.com">
      </div>
      
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="password" placeholder="123456" value="123456">
      </div>
      
      <button class="btn btn-primary" onclick="testLogin()">测试登录</button>
      <button class="btn btn-secondary" onclick="testSession()">测试Session</button>
      <button class="btn btn-secondary" onclick="testServices()">测试服务API</button>
      
      <div id="result"></div>
      <div id="loading" style="display: none;">
        <div class="spinner"></div>
        <p>请求中...</p>
      </div>
    </div>
  </div>

  <script>
    function showLoading() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').innerHTML = '';
    }
    
    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }
    
    function showResult(message, isError = false) {
      const resultDiv = document.getElementById('result');
      resultDiv.className = `result ${isError ? 'error' : 'success'}`;
      resultDiv.innerHTML = message;
    }
    
    async function testLogin() {
      showLoading();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          showResult(`登录成功！<br>用户: ${data.user.name} (${data.user.role})<br>Session已设置`);
        } else {
          showResult(`登录失败: ${data.error}`, true);
        }
      } catch (error) {
        showResult(`请求失败: ${error.message}`, true);
      } finally {
        hideLoading();
      }
    }
    
    async function testSession() {
      showLoading();
      
      try {
        const response = await fetch('/api/auth/session', {
          credentials: 'include'
        });
        
        const data = await response.json();
        
        if (data.authenticated) {
          showResult(`Session验证成功！<br>用户: ${data.user.name} (${data.user.email})`);
        } else {
          showResult('未登录或Session已过期', true);
        }
      } catch (error) {
        showResult(`请求失败: ${error.message}`, true);
      } finally {
        hideLoading();
      }
    }
    
    async function testServices() {
      showLoading();
      
      try {
        const response = await fetch('/api/services', {
          credentials: 'include'
        });
        
        const data = await response.json();
        
        if (response.ok) {
          showResult(`服务API成功！<br>获取到 ${data.length} 个服务`);
          console.log('服务数据:', data);
        } else {
          showResult(`服务API失败: ${response.status}`, true);
        }
      } catch (error) {
        showResult(`请求失败: ${error.message}`, true);
      } finally {
        hideLoading();
      }
    }
  </script>
</body>
</html>
