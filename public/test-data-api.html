<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数据API测试 - 设计师接单平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #F5F6FA; min-height: 100vh; padding: 20px; }
    
    .container { max-width: 800px; margin: 0 auto; }
    
    .title { font-size: 24px; font-weight: 700; color: #1D2129; margin-bottom: 20px; text-align: center; }
    
    .test-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 30px; }
    .test-btn { padding: 12px; background: #00B578; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .test-btn:hover { background: #009A63; }
    
    .result { background: white; border: 1px solid #E5E6EB; border-radius: 12px; padding: 20px; margin-top: 20px; }
    .result-title { font-size: 16px; font-weight: 600; color: #1D2129; margin-bottom: 12px; }
    .result-content { font-family: monospace; font-size: 12px; background: #F5F6FA; padding: 12px; border-radius: 8px; overflow-x: auto; }
    
    .loading { text-align: center; padding: 20px; }
    .spinner { width: 24px; height: 24px; border: 3px solid #E5E6EB; border-top-color: #00B578; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">数据API测试</h1>
    
    <div class="test-buttons">
      <button class="test-btn" onclick="testAPI('services')">测试服务API</button>
      <button class="test-btn" onclick="testAPI('clients')">测试客户API</button>
      <button class="test-btn" onclick="testAPI('orders')">测试订单API</button>
      <button class="test-btn" onclick="testAPI('contracts')">测试合同API</button>
      <button class="test-btn" onclick="testAPI('invoices')">测试发票API</button>
      <button class="test-btn" onclick="testAPI('notifications')">测试通知API</button>
      <button class="test-btn" onclick="testAPI('analytics')">测试分析API</button>
      <button class="test-btn" onclick="testAPI('profile')">测试资料API</button>
      <button class="test-btn" onclick="testAPI('settings')">测试设置API</button>
    </div>
    
    <div id="loading" style="display: none;">
      <div class="spinner"></div>
      <p>请求中...</p>
    </div>
    
    <div id="result" style="display: none;">
      <div class="result-title" id="result-title"></div>
      <pre class="result-content" id="result-content"></pre>
    </div>
  </div>

  <script>
    async function testAPI(type) {
      showLoading();
      
      try {
        const response = await fetch(`/api/data?type=${type}`, {
          credentials: 'include'
        });
        
        const data = await response.json();
        
        showResult(`${type} API`, {
          status: response.status,
          ok: response.ok,
          data: data
        });
      } catch (error) {
        showResult(`${type} API`, {
          error: error.message
        });
      } finally {
        hideLoading();
      }
    }
    
    function showLoading() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').style.display = 'none';
    }
    
    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }
    
    function showResult(title, result) {
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-content').textContent = JSON.stringify(result, null, 2);
      document.getElementById('result').style.display = 'block';
    }
  </script>
</body>
</html>
