<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>项目管理 - 设计师接单平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #F5F6FA; min-height: 100vh; }
    
    .container { max-width: 1200px; }
    
    .header { text-align: center; margin-bottom: 30px; padding: 20px; }
    .title { font-size: 28px; font-weight: 700; color: #1D2129; margin-bottom: 8px; }
    .subtitle { font-size: 16px; color: #86909C; }
    
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
    .stat-card { background: white; border: 1px solid #E5E6EB; border-radius: 12px; padding: 20px; text-align: center; }
    .stat-label { font-size: 14px; color: #86909C; margin-bottom: 8px; }
    .stat-value { font-size: 24px; font-weight: 700; color: #00B578; }
    
    .kanban-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .kanban-column { background: white; border: 1px solid #E5E6EB; border-radius: 12px; padding: 20px; }
    .column-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .column-title { font-size: 16px; font-weight: 600; color: #1D2129; }
    .column-count { background: #F5F6FA; color: #86909C; padding: 4px 8px; border-radius: 12px; font-size: 12px; }
    
    .task-list { display: flex; flex-direction: column; gap: 12px; }
    .task-card { background: #F5F6FA; border: 1px solid #E5E6EB; border-radius: 8px; padding: 16px; cursor: move; }
    .task-card:hover { border-color: #00B578; }
    .task-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .task-title { font-size: 14px; font-weight: 600; color: #1D2129; }
    .task-priority { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; }
    .priority-high { background: rgba(255, 77, 79, 0.1); color: #FF4D4F; }
    .priority-medium { background: rgba(255, 125, 0, 0.1); color: #FF7D00; }
    .priority-low { background: rgba(0, 181, 120, 0.1); color: #00B578; }
    
    .task-description { color: #86909C; font-size: 12px; line-height: 1.4; margin-bottom: 12px; }
    .task-footer { display: flex; justify-content: space-between; align-items: center; }
    .task-assignee { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #86909C; }
    .task-due { font-size: 11px; color: #86909C; }
    
    .add-task-btn { width: 100%; background: none; border: 1px dashed #E5E6EB; border-radius: 8px; padding: 12px; color: #86909C; cursor: pointer; margin-top: 12px; }
    .add-task-btn:hover { border-color: #00B578; color: #00B578; }
    
    .loading { text-align: center; padding: 60px; }
    .spinner { width: 48px; height: 48px; border: 4px solid #E5E6EB; border-top-color: #00B578; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error { background: #FFF2F0; border: 1px solid #FFCCC7; color: #FF4D4F; padding: 16px; border-radius: 8px; margin-bottom: 20px; }
    
    
    .nav-link { color: #00B578; text-decoration: none; padding: 8px 16px; border-radius: 8px; }
    .nav-link:hover { background: rgba(0, 181, 120, 0.1); }
    
    @media (max-width: 768px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .kanban-board { grid-template-columns: 1fr; }
    }
      /* 左侧导航 */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 240px;
      height: 100vh;
      background: white;
      border-right: 1px solid #E5E6EB;
      padding: 20px;
      overflow-y: auto;
      z-index: 1000;
    }
    
    .sidebar-header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #E5E6EB;
    }
    
    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
      color: #1D2129;
      margin-bottom: 4px;
    }
    
    .sidebar-subtitle {
      font-size: 12px;
      color: #86909C;
    }
    
    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: #1D2129;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.2s;
    }
    
    .nav-link:hover {
      background: #F5F6FA;
      color: #00B578;
    }
    
    .nav-link.active {
      background: rgba(0, 181, 120, 0.1);
      color: #00B578;
      font-weight: 500;
    }
    
    .nav-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }
    
    .nav-text {
      font-size: 14px;
    }
    
    /* 主内容区域 */
    .main-content {
      margin-left: 240px;
      padding: 20px;
    }
    
    @media (max-width: 768px) {
      .sidebar {
        width: 200px;
        transform: translateX(-100%);
        transition: transform 0.3s;
      }
      
      .sidebar.open {
        transform: translateX(0);
      }
      
      .main-content {
        margin-left: 0;
      }
      
      .mobile-menu-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 1001;
        background: white;
        border: 1px solid #E5E6EB;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
      }
    }
  </style>
</head>
<body>
    <!-- 左侧导航 -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">设计师平台</div>
        <div class="sidebar-subtitle">管理您的设计业务</div>
      </div>
      
      <div class="nav-menu">
        <a href="/dashboard-simple.html" class="nav-link ">
          <div class="nav-icon">📊</div>
          <div class="nav-text">仪表盘</div>
        </a>
        <a href="/services-simple.html" class="nav-link ">
          <div class="nav-icon">🛠️</div>
          <div class="nav-text">服务管理</div>
        </a>
        <a href="/clients-simple.html" class="nav-link ">
          <div class="nav-icon">👥</div>
          <div class="nav-text">客户管理</div>
        </a>
        <a href="/orders-simple.html" class="nav-link ">
          <div class="nav-icon">📦</div>
          <div class="nav-text">订单管理</div>
        </a>
        <a href="/contracts-simple.html" class="nav-link ">
          <div class="nav-icon">📝</div>
          <div class="nav-text">合同管理</div>
        </a>
        <a href="/invoices-simple.html" class="nav-link ">
          <div class="nav-icon">🧾</div>
          <div class="nav-text">发票管理</div>
        </a>
        <a href="/analytics-simple.html" class="nav-link ">
          <div class="nav-icon">📈</div>
          <div class="nav-text">数据分析</div>
        </a>
        <a href="/notifications-simple.html" class="nav-link ">
          <div class="nav-icon">🔔</div>
          <div class="nav-text">通知中心</div>
        </a>
        <a href="/settings-simple.html" class="nav-link ">
          <div class="nav-icon">⚙️</div>
          <div class="nav-text">系统设置</div>
        </a>
        <a href="/kanban-simple.html" class="nav-link active">
          <div class="nav-icon">📋</div>
          <div class="nav-text">项目管理</div>
        </a>
      </div>
    </div>
    
    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-btn" id="mobileMenuBtn" style="display: none;">☰</button>
    
    <!-- 主内容 -->
    <div class="main-content">
    <div class="container">
    <!-- 标题 -->
    <div class="header">
      <h1 class="title">项目管理</h1>
      <p class="subtitle">项目进度和任务管理</p>
    </div>
    
    <!-- 错误消息 -->
    <div id="errorMessage" class="error" style="display: none;"></div>
    
    <!-- 统计 -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">总任务数</div>
        <div class="stat-value" id="totalTasks">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">进行中</div>
        <div class="stat-value" id="inProgressTasks">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">待处理</div>
        <div class="stat-value" id="pendingTasks">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">已完成</div>
        <div class="stat-value" id="completedTasks">0</div>
      </div>
    </div>
    
    <!-- 加载状态 -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <div>加载项目数据...</div>
    </div>
    
    <!-- 看板 -->
    <div id="kanbanBoard" class="kanban-board" style="display: none;">
      <!-- 看板列将通过JavaScript动态生成 -->
    </div>
  </div>

  <script>
    // 全局变量
    let allTasks = [];
    
    // 页面加载时初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadTasks();
    });
    
    // 加载任务数据
    async function loadTasks() {
      try {
        showLoading(true);
        
        // 模拟数据（当API不可用时）
        const useMockData = localStorage.getItem('useMockData') === 'true' || window.location.search.includes('mock=true');
        if (useMockData) {
          console.log('使用模拟数据');
          allTasks = getMockTasks();
          updateStats(allTasks);
          renderKanban(allTasks);
          showLoading(false);
          return;
        }
        
        // 实际项目中这里会调用API
        // const response = await fetch('/api/tasks');
        // allTasks = await response.json();
        // updateStats(allTasks);
        // renderKanban(allTasks);
        
      } catch (error) {
        showError('加载任务数据失败: ' + error.message);
        // 使用模拟数据作为后备
        allTasks = getMockTasks();
        updateStats(allTasks);
        renderKanban(allTasks);
      } finally {
        showLoading(false);
      }
    }
    
    // 模拟任务数据
    function getMockTasks() {
      return [
        {
          id: '1',
          title: '品牌设计初稿',
          description: '完成品牌标识的初步设计',
          status: 'todo',
          priority: 'high',
          assignee: '设计师A',
          dueDate: '2026-04-08',
          project: '品牌设计项目'
        },
        {
          id: '2',
          title: 'UI界面设计',
          description: '完成移动端应用的主要界面设计',
          status: 'in-progress',
          priority: 'high',
          assignee: '设计师B',
          dueDate: '2026-04-10',
          project: '移动应用项目'
        },
        {
          id: '3',
          title: '网站首页设计',
          description: '设计企业官网的首页',
          status: 'in-progress',
          priority: 'medium',
          assignee: '设计师C',
          dueDate: '2026-04-12',
          project: '网站设计项目'
        },
        {
          id: '4',
          title: '宣传册设计',
          description: '完成产品宣传册的平面设计',
          status: 'review',
          priority: 'medium',
          assignee: '设计师A',
          dueDate: '2026-04-05',
          project: '平面设计项目'
        },
        {
          id: '5',
          title: '图标设计',
          description: '设计一套应用图标',
          status: 'done',
          priority: 'low',
          assignee: '设计师B',
          dueDate: '2026-04-03',
          project: 'UI设计项目'
        },
        {
          id: '6',
          title: '用户调研报告',
          description: '整理用户调研结果并撰写报告',
          status: 'todo',
          priority: 'medium',
          assignee: '设计师C',
          dueDate: '2026-04-15',
          project: '用户研究项目'
        }
      ];
    }
    
    // 更新统计数据
    function updateStats(tasks) {
      const totalTasks = tasks.length;
      const inProgressTasks = tasks.filter(task => task.status === 'in-progress').length;
      const pendingTasks = tasks.filter(task => task.status === 'todo').length;
      const completedTasks = tasks.filter(task => task.status === 'done').length;
      
      document.getElementById('totalTasks').textContent = totalTasks;
      document.getElementById('inProgressTasks').textContent = inProgressTasks;
      document.getElementById('pendingTasks').textContent = pendingTasks;
      document.getElementById('completedTasks').textContent = completedTasks;
    }
    
    // 渲染看板
    function renderKanban(tasks) {
      const board = document.getElementById('kanbanBoard');
      
      // 定义看板列
      const columns = [
        { id: 'todo', title: '待处理', color: '#E5E6EB' },
        { id: 'in-progress', title: '进行中', color: '#00B578' },
        { id: 'review', title: '审核中', color: '#FF7D00' },
        { id: 'done', title: '已完成', color: '#86909C' }
      ];
      
      let html = '';
      
      columns.forEach(column => {
        const columnTasks = tasks.filter(task => task.status === column.id);
        
        html += `
          <div class="kanban-column">
            <div class="column-header">
              <div class="column-title">${column.title}</div>
              <div class="column-count">${columnTasks.length}</div>
            </div>
            
            <div class="task-list" id="task-list-${column.id}">
        `;
        
        columnTasks.forEach(task => {
          const priorityClass = `priority-${task.priority}`;
          const priorityText = task.priority === 'high' ? '高' : task.priority === 'medium' ? '中' : '低';
          const dueDate = formatDate(task.dueDate);
          
          html += `
            <div class="task-card" draggable="true" data-task-id="${task.id}">
              <div class="task-header">
                <div class="task-title">${escapeHtml(task.title)}</div>
                <div class="task-priority ${priorityClass}">${priorityText}</div>
              </div>
              <div class="task-description">${escapeHtml(task.description)}</div>
              <div class="task-footer">
                <div class="task-assignee">
                  <span>👤</span>
                  <span>${escapeHtml(task.assignee || '未分配')}</span>
                </div>
                <div class="task-due">${dueDate}</div>
              </div>
            </div>
          `;
        });
        
        html += `
              <button class="add-task-btn" onclick="addTask('${column.id}')">+ 添加任务</button>
            </div>
          </div>
        `;
      });
      
      board.innerHTML = html;
      board.style.display = 'grid';
      
      // 初始化拖拽功能
      initDragAndDrop();
    }
    
    // 初始化拖拽功能
    function initDragAndDrop() {
      const taskCards = document.querySelectorAll('.task-card');
      
      taskCards.forEach(card => {
        card.addEventListener('dragstart', handleDragStart);
        card.addEventListener('dragend', handleDragEnd);
      });
      
      const columns = document.querySelectorAll('.task-list');
      
      columns.forEach(column => {
        column.addEventListener('dragover', handleDragOver);
        column.addEventListener('drop', handleDrop);
      });
    }
    
    // 拖拽事件处理
    let draggedTask = null;
    
    function handleDragStart(e) {
      draggedTask = this;
      this.style.opacity = '0.4';
    }
    
    function handleDragEnd(e) {
      this.style.opacity = '1';
      draggedTask = null;
    }
    
    function handleDragOver(e) {
      e.preventDefault();
    }
    
    function handleDrop(e) {
      e.preventDefault();
      if (draggedTask) {
        this.appendChild(draggedTask);
        
        // 更新任务状态
        const taskId = draggedTask.dataset.taskId;
        const newStatus = this.id.replace('task-list-', '');
        
        const task = allTasks.find(t => t.id === taskId);
        if (task) {
          task.status = newStatus;
          updateStats(allTasks);
        }
      }
    }
    
    // 添加任务
    function addTask(status) {
      const title = prompt('请输入任务标题:');
      if (title) {
        const description = prompt('请输入任务描述:');
        const newTask = {
          id: Date.now().toString(),
          title: title,
          description: description || '',
          status: status,
          priority: 'medium',
          assignee: '当前用户',
          dueDate: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
          project: '新项目'
        };
        
        allTasks.push(newTask);
        updateStats(allTasks);
        renderKanban(allTasks);
        showError('任务已添加');
      }
    }
    
    // 工具函数
    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
      document.getElementById('kanbanBoard').style.display = show ? 'none' : 'grid';
    }
    
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 5000);
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function formatDate(dateString) {
      if (!dateString) return '未设置';
      const date = new Date(dateString);
      return date.toLocaleDateString('zh-CN');
    }
    
    function getStatusText(status) {
      const statusMap = {
        'draft': '草稿',
        'pending': '待处理',
        'processing': '进行中',
        'review': '审核中',
        'completed': '已完成'
      };
      return statusMap[status] || '未知';
    }
  </script>
  <script>
    // 移动端菜单切换
    document.addEventListener('DOMContentLoaded', () => {
      const mobileMenuBtn = document.getElementById('mobileMenuBtn');
      const sidebar = document.getElementById('sidebar');
      
      if (mobileMenuBtn && sidebar) {
        // 检查是否为移动端
        const isMobile = window.innerWidth <= 768;
        if (isMobile) {
          mobileMenuBtn.style.display = 'block';
          
          mobileMenuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
          });
          
          // 点击内容区域关闭菜单
          document.querySelector('.main-content').addEventListener('click', () => {
            if (sidebar.classList.contains('open')) {
              sidebar.classList.remove('open');
            }
          });
        }
      }
      
      // 设置当前页面激活状态
      const currentPage = window.location.pathname.split('/').pop() || 'dashboard-simple.html';
      const navLinks = document.querySelectorAll('.nav-link');
      
      navLinks.forEach(link => {
        const href = link.getAttribute('href');
        if (href && href.includes(currentPage)) {
          link.classList.add('active');
        }
      });
    });
  </script>
</body>
</html>
