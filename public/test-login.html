<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00B578, #009A63);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .test-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        
        .test-btn {
            padding: 14px;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .test-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .test-btn.primary {
            background: white;
            color: #00B578;
            font-weight: 600;
        }
        
        .test-btn.primary:hover {
            background: #f5f5f5;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            text-align: left;
        }
        
        .status h3 {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-label {
            opacity: 0.8;
        }
        
        .status-value {
            font-weight: 500;
        }
        
        .success {
            color: #4CAF50;
        }
        
        .error {
            color: #FF5252;
        }
        
        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: left;
        }
        
        .instructions h3 {
            margin-bottom: 8px;
            font-size: 1rem;
        }
        
        .instructions ul {
            padding-left: 20px;
        }
        
        .instructions li {
            margin-bottom: 6px;
            line-height: 1.4;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 登录功能测试</h1>
        <p>测试设计师平台登录和路由跳转功能</p>
        
        <div class="test-buttons">
            <a href="/login" class="test-btn primary">测试React登录页面</a>
            <a href="/services" class="test-btn">直接访问服务页面</a>
            <a href="/dashboard" class="test-btn">直接访问仪表盘</a>
            <a href="/" class="test-btn">返回首页</a>
        </div>
        
        <div class="status">
            <h3>📊 系统状态</h3>
            <div class="status-item">
                <span class="status-label">服务器状态</span>
                <span class="status-value success" id="serverStatus">检测中...</span>
            </div>
            <div class="status-item">
                <span class="status-label">登录状态</span>
                <span class="status-value" id="loginStatus">检测中...</span>
            </div>
            <div class="status-item">
                <span class="status-label">LocalStorage</span>
                <span class="status-value" id="storageStatus">检测中...</span>
            </div>
            <div class="status-item">
                <span class="status-label">路由跳转</span>
                <span class="status-value" id="routerStatus">待测试</span>
            </div>
        </div>
        
        <div class="instructions">
            <h3>🔍 测试步骤</h3>
            <ul>
                <li>1. 点击"测试React登录页面"进入登录界面</li>
                <li>2. 输入任意手机号和密码（或使用演示账号）</li>
                <li>3. 点击登录按钮，应该跳转到服务页面</li>
                <li>4. 如果无法跳转，检查浏览器控制台错误</li>
                <li>5. 可以尝试直接访问其他页面测试路由</li>
            </ul>
        </div>
        
        <div style="margin-top: 20px; font-size: 0.8rem; opacity: 0.7;">
            <p>💡 提示：如果登录后没有反应，请按F12打开开发者工具查看控制台错误</p>
        </div>
    </div>
    
    <script>
        // 检查系统状态
        function checkSystemStatus() {
            // 检查服务器状态
            fetch('/')
                .then(response => {
                    document.getElementById('serverStatus').textContent = response.ok ? '✅ 正常' : '❌ 异常';
                    document.getElementById('serverStatus').className = response.ok ? 'status-value success' : 'status-value error';
                })
                .catch(() => {
                    document.getElementById('serverStatus').textContent = '❌ 无法连接';
                    document.getElementById('serverStatus').className = 'status-value error';
                });
            
            // 检查登录状态
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            document.getElementById('loginStatus').textContent = isLoggedIn ? '✅ 已登录' : '❌ 未登录';
            document.getElementById('loginStatus').className = isLoggedIn ? 'status-value success' : 'status-value';
            
            // 检查LocalStorage
            try {
                localStorage.setItem('test', 'test');
                localStorage.removeItem('test');
                document.getElementById('storageStatus').textContent = '✅ 可用';
                document.getElementById('storageStatus').className = 'status-value success';
            } catch (e) {
                document.getElementById('storageStatus').textContent = '❌ 不可用';
                document.getElementById('storageStatus').className = 'status-value error';
            }
        }
        
        // 页面加载时检查状态
        document.addEventListener('DOMContentLoaded', checkSystemStatus);
        
        // 每10秒更新一次状态
        setInterval(checkSystemStatus, 10000);
        
        // 测试路由跳转
        document.querySelectorAll('.test-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href !== '#') {
                    document.getElementById('routerStatus').textContent = `跳转到: ${href}`;
                    document.getElementById('routerStatus').className = 'status-value';
                }
            });
        });
    </script>
</body>
</html>
